<div [ngClass]="{
        'fixed right-0 top-1/2 -translate-y-1/2 z-[150]': mode === 'fixed',
        'absolute left-1/2 -translate-x-1/2 transition-all duration-300 ease-out': mode === 'sidebar',
        'z-[120] w-[88%]': mode === 'sidebar' && isOpen(),
        'z-[5] w-[100px]': mode === 'sidebar' && !isOpen()
     }" 
     [ngStyle]="{
        'bottom': mode === 'sidebar' ? (isOpen() ? 'calc(100% + 10px)' : 'calc(100% - 16px)') : 'auto'
     }"
     class="flex items-center">
    
    <div class="flex flex-col w-full transition-all duration-300 border-white/10 overflow-hidden bg-[#1a1c26]"
        [ngClass]="{
            'flex-row bg-[#1f222e] rounded-l-2xl border-y border-l': mode === 'fixed',
            'rounded-2xl border shadow-[0_-10px_40px_rgba(0,0,0,0.6)]': mode === 'sidebar' && isOpen(),
            'h-12 rounded-t-[20px] rounded-b-none border-x border-t shadow-lg': mode === 'sidebar' && !isOpen(),
            'max-h-[48px] border-slate-700/50 shadow-xl': !isOpen() && mode === 'fixed',
            'max-h-[500px] border-emerald-500/40 shadow-[0_0_20px_rgba(16,185,129,0.2)]' : isOpen() && currencyState.currentCurrency() === 'USD',
            'max-h-[500px] border-cyan-500/40 shadow-[0_0_20px_rgba(6,182,212,0.2)]' : isOpen() && currencyState.currentCurrency() === 'ARS'
         }">

        <!-- Expanded Panel Content -->
        <div class="transition-all duration-300 ease-in-out flex flex-col justify-center overflow-hidden" 
            [ngClass]="{
                'w-0 opacity-0 pointer-events-none': !isOpen() && mode === 'fixed',
                'w-[260px] opacity-100': isOpen() && mode === 'fixed',
                'h-0 opacity-0 pointer-events-none': !isOpen() && mode === 'sidebar',
                'h-[200px] w-full opacity-100': isOpen() && mode === 'sidebar'
            }">

            <!-- Close Button Overlay for panel -->
            @if (isOpen()) {
            <button (click)="togglePanel()"
                class="absolute right-3 top-3 w-7 h-7 flex items-center justify-center rounded-full bg-white/5 text-slate-500 hover:text-white hover:bg-white/10 transition-all z-20">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </button>
            }

            <div class="p-6 flex flex-col whitespace-nowrap" [class.w-[260px]]="mode === 'fixed'" [class.pt-10]="mode === 'fixed'">
                <span class="text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-3">Tasa de cambio</span>

                <div class="flex items-center justify-between mb-5">
                    <span class="text-white font-bold tracking-wide text-xs">USD / ARS</span>
                    <span class="font-black text-xl" [ngClass]="{
                        'text-emerald-400': currencyState.currentCurrency() === 'USD',
                        'text-cyan-400': currencyState.currentCurrency() === 'ARS'
                    }">${{ currencyState.exchangeRate() }}</span>
                </div>

                <div class="h-px w-full bg-white/5 mb-5"></div>

                <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase mb-3">Mostrar montos en:</span>

                <div class="flex items-center gap-3">
                    <button (click)="setCurrency('USD')"
                        class="flex-1 py-2.5 px-2 rounded-xl font-bold text-xs transition-all duration-300 flex items-center justify-center"
                        [ngClass]="{
                            'bg-emerald-500 text-white shadow-[0_4px_15px_rgba(16,185,129,0.35)]': currencyState.currentCurrency() === 'USD',
                            'bg-white/5 text-slate-400 hover:bg-white/10': currencyState.currentCurrency() !== 'USD'
                        }">
                        USD
                    </button>
                    <button (click)="setCurrency('ARS')"
                        class="flex-1 py-2.5 px-2 rounded-xl font-bold text-xs transition-all duration-300 flex items-center justify-center"
                        [ngClass]="{
                            'bg-cyan-500 text-white shadow-[0_4px_15px_rgba(6,182,212,0.35)]': currencyState.currentCurrency() === 'ARS',
                            'bg-white/5 text-slate-400 hover:bg-white/10': currencyState.currentCurrency() !== 'ARS'
                        }">
                        ARS
                    </button>
                </div>
            </div>
        </div>

        <!-- Toggle Pill / Handle -->
        <button (click)="togglePanel()"
            class="flex items-center justify-center transition-all duration-300 hover:bg-white/5 relative z-10 shrink-0 cursor-pointer h-12"
            [ngClass]="{
                'w-12 px-0': mode === 'fixed',
                'w-full bg-white/[0.02]': mode === 'sidebar'
            }">
            @if (isOpen() && mode === 'sidebar') {
                <span class="material-symbols-outlined text-slate-400 text-2xl leading-none rotate-0">expand_more</span>
            } @else {
                <span class="font-black flex items-center justify-center text-slate-400 text-lg leading-none rotate-0 transition-transform duration-300"
                      [ngClass]="{'-translate-y-2': mode === 'sidebar' && !isOpen()}">$</span>
            }
        </button>
    </div>
</div>

<!-- Transparent Full Screen Overlay -->
@if (isOpen()) {
    <div class="fixed inset-0 z-[115] bg-black/20" (click)="togglePanel()"></div>
}
