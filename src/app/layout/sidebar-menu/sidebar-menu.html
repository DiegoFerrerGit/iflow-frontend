<aside
    class="fixed left-0 top-0 h-full !bg-[var(--nav-bg)] z-[100] flex flex-col border-r border-white/5 overflow-hidden transition-all duration-300"
    style="transition: var(--nav-transition), width 0.3s ease"
    [class.w-[256px]]="isExpanded" [class.w-[80px]]="!isExpanded">

    <div class="burger-menu h-20 flex items-center px-4 justify-between border-b border-white/5 shrink-0">
        <div class="flex items-center gap-3 cursor-pointer" routerLink="/odin">
            <span
                class="logo-text text-xl font-black tracking-widest uppercase transition-opacity duration-300 text-transparent bg-clip-text select-none"
                [style.background-image]="'linear-gradient(to right, var(--nav-accent-from), var(--nav-accent-to))'"
                [class.opacity-100]="isExpanded" [class.opacity-0]="!isExpanded" [class.hidden]="!isExpanded">
                IFLOW
            </span>
        </div>

        <!-- Logo SVG - Solo visible cuando está contraído -->
        @if (!isExpanded) {
        <img src="assets/images/iflow-logo.svg" alt="IFLOW" routerLink="/odin"
            [style.filter]="'drop-shadow(0 0 8px ' + 'var(--nav-glow)' + ')'"
            class="w-10 h-10 object-contain cursor-pointer transition-all duration-500">
        }
    </div>

    <!-- Botón flechas plegables - Siempre visible, flotante a la derecha -->
    <button (click)="toggleSidebar()"
        class="absolute -right-4 top-1/2 -translate-y-1/2 z-50 cursor-pointer text-white !bg-[var(--nav-bg)] border border-white/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)] flex items-center justify-center h-10 w-8 rounded-l-md hover:!text-[var(--nav-accent-from)] hover:!border-[var(--nav-accent-from)]/50 transition-all rounded-r-xl"
        style="transition: var(--nav-transition)">
        <span class="material-symbols-outlined text-[1.2rem]"
            [style.transform]="isExpanded ? 'rotate(0deg)' : 'rotate(180deg)'"
            style="transition: transform 0.3s ease">keyboard_double_arrow_left</span>
    </button>

    <div class="flex-1 py-8 px-4 flex flex-col gap-2 overflow-y-auto overflow-x-hidden">

        <nav class="flex flex-col gap-1"> <!-- Item: ODIN -->
            <a #odinLink="routerLinkActive" routerLink="/odin" routerLinkActive="!text-[var(--nav-accent-to)]"
                [routerLinkActiveOptions]="{exact: false}"
                class="flex items-center gap-4 py-3 rounded-xl transition-all text-slate-400 hover:bg-white/5 hover:text-white"
                [class.px-3]="isExpanded" [class.justify-start]="isExpanded" [class.px-0]="!isExpanded"
                [class.justify-center]="!isExpanded">
                
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0">
                    <defs>
                        <linearGradient id="odinEyeGradSidebar" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" [attr.stop-color]="'var(--nav-accent-from)'" style="stop-opacity:1" />
                            <stop offset="100%" [attr.stop-color]="'var(--nav-accent-to)'" style="stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M25 50 C 35 15, 75 15, 85 50 C 75 85, 35 85, 25 50 Z" 
                          [attr.fill]="odinLink.isActive ? 'url(#odinEyeGradSidebar)' : 'currentColor'" />
                    <circle cx="55" cy="50" r="18" fill="#0f0a15" />
                    <rect x="53" y="38" width="4" height="24" rx="2" fill="#f1f5f9" />
                </svg>
                <span class="nav-label text-sm font-bold transition-opacity duration-300"
                    [class.opacity-100]="isExpanded" [class.opacity-0]="!isExpanded" [class.hidden]="!isExpanded">
                    ODIN
                </span>
            </a>

            <!-- Item: PATRIMONIO -->
            <a routerLink="/portfolio" routerLinkActive="!text-[#1e90ff]"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-4 py-3 rounded-xl transition-all text-slate-400 hover:bg-white/5 hover:text-white"
                [class.px-3]="isExpanded" [class.justify-start]="isExpanded" [class.px-0]="!isExpanded"
                [class.justify-center]="!isExpanded">
                <span class="material-symbols-outlined text-2xl shrink-0">monitoring</span>
                <span class="nav-label text-sm font-bold transition-opacity duration-300"
                    [class.opacity-100]="isExpanded" [class.opacity-0]="!isExpanded" [class.hidden]="!isExpanded">
                    PATRIMONIO
                </span>
            </a>
        </nav>
    </div>

    <!-- Footer Section with Masking Context -->
    <div class="mt-auto relative">
        <app-currency-switcher mode="sidebar" [isSidebarExpanded]="isExpanded"></app-currency-switcher>

        <div class="p-4 flex flex-col gap-4 border-t border-white/5 relative !bg-[var(--nav-bg)] z-10 w-full"
             style="transition: var(--nav-transition)">
            <div class="flex items-center gap-3 py-2 w-full" [class.px-2]="isExpanded"
                [class.justify-start]="isExpanded" [class.px-0]="!isExpanded" [class.justify-center]="!isExpanded">
                <!-- Avatar Image (if available) -->
                @if (userAvatarUrl()) {
                <img [src]="userAvatarUrl()" alt="Avatar" referrerpolicy="no-referrer"
                    [style.box-shadow]="'0 0 15px ' + 'var(--nav-glow)'"
                    class="w-10 h-10 min-w-[40px] rounded-full object-cover border border-white/10 transition-shadow duration-500" />
                } @else {
                <!-- Initials Fallback (if no avatar) -->
                <div
                    [style.background-color]="'var(--nav-accent-from)'"
                    [style.box-shadow]="'0 0 15px ' + 'var(--nav-glow)'"
                    class="w-10 h-10 min-w-[40px] rounded-full flex items-center justify-center text-[#16121d] font-bold text-sm transition-all duration-500">
                    {{ userInitials() }}
                </div>
                }
                <div class="user-label overflow-hidden transition-opacity duration-300" [class.opacity-100]="isExpanded"
                    [class.opacity-0]="!isExpanded" [class.hidden]="!isExpanded">
                    <p class="text-xs font-bold text-white truncate">{{ userFullName() || 'Usuario' }}</p>
                </div>
            </div>

            <button (click)="logout()"
                class="flex items-center gap-4 py-3 rounded-xl text-logout-coral hover:bg-logout-coral/10 transition-all group cursor-pointer w-full text-left"
                [class.px-3]="isExpanded" [class.justify-start]="isExpanded" [class.px-0]="!isExpanded"
                [class.justify-center]="!isExpanded">
                <span class="material-symbols-outlined text-2xl">logout</span>
                <span class="nav-label text-sm font-bold transition-opacity duration-300"
                    [class.opacity-100]="isExpanded" [class.opacity-0]="!isExpanded" [class.hidden]="!isExpanded">
                    Cerrar Sesión
                </span>
            </button>
        </div>
    </div>
</aside>
