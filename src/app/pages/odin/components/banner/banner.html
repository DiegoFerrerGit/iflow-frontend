<section class="banner-hero">
    <!-- Parallax Video Wrapper -->
    <div class="video-container">
        <video #videoPlayer autoplay muted loop playsinline class="banner-video" (loadeddata)="attemptVideoPlay()"
            (canplay)="attemptVideoPlay()" (playing)="attemptVideoPlay()">
            <source
                src="assets/videos/background-odin.mp4"
                type="video/mp4">

        </video>
        <!-- Purple/Violet Overlay -->
        <div class="banner-overlay"></div>
    </div>



    <!-- Content (Eye logo, Title, Subtitle) -->
    <div class="relative z-20 text-center max-w-2xl mx-auto px-6 py-12 md:py-20">
        <!-- OJO DE ODÍN -->
        <div class="relative flex flex-col items-center -mb-4 md:-mb-6">
            <div class="w-32 h-32 md:w-40 md:h-40">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    class="odin-eye-svg w-full h-full">
                    <defs>
                        <linearGradient id="odinEyeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M25 50 C 35 15, 75 15, 85 50 C 75 85, 35 85, 25 50 Z" fill="url(#odinEyeGrad)" />
                    <circle cx="55" cy="50" r="18" fill="#0f0a15" />
                    <rect x="53" y="38" width="4" height="24" rx="2" fill="#f1f5f9" class="eye-pupil-bar" />
                </svg>
            </div>
        </div>
        <h1 class="text-7xl font-black tracking-tighter mb-2 text-white text-center leading-none glow-text">ODIN</h1>
        <p class="text-secondary font-black tracking-[0.5em] uppercase text-xs mb-1 text-center glow-subtext">
            Operational
            Distribution of Income Netflow</p>
        <p class="hidden md:block text-slate-400 text-sm font-semibold text-center opacity-80">Distribución Operativa
            del Flujo Neto de Ingresos</p>
    </div>
</section>
