<div class="relative w-80 h-80 md:w-[340px] md:h-[340px] flex shrink-0 items-center justify-center">
    <svg class="w-full h-full transform -rotate-90 scale-x-[-1] drop-shadow-[0_0_10px_rgba(0,0,0,0.5)]"
        viewBox="0 0 120 120" overflow="visible">
        <!-- Background Track -->
        <circle cx="60" cy="60" r="50" fill="none" class="stroke-slate-800" stroke-width="12" />

        <!-- Hit Areas (REVERSE Order for Z-indexing) -->
        @for (segment of segments.slice().reverse(); track segment.id + '_hit') {
        <circle cx="60" cy="60" r="50" fill="none" stroke="transparent" stroke-width="32" stroke-linecap="butt"
            [attr.stroke-dasharray]="segment.dashArray" [attr.stroke-dashoffset]="segment.dashOffset"
            class="cursor-pointer" (mouseenter)="hoveredSegment = segment" (mouseleave)="hoveredSegment = null" />
        }

        <!-- Dynamic Segments (REVERSE Order: S1 on top of S2) -->
        <!-- Each segment has stroke-linecap="round" at its end, covering the NEXT segment's start -->
        @for (segment of segments.slice().reverse(); track segment.id) {
        <circle cx="60" cy="60" r="50" fill="none" [attr.stroke]="segment.color"
            [attr.stroke-width]="hoveredSegment?.id === segment.id ? 20 : 16" stroke-linecap="round"
            [attr.stroke-dasharray]="segment.dashArray" [attr.stroke-dashoffset]="segment.dashOffset"
            class="transition-all duration-200 ease-out pointer-events-none"
            [class.brightness-125]="hoveredSegment?.id === segment.id" />
        }

        <!-- The "Final Loop Closer" Overlay (S3 on top of S1) -->
        <!-- We use a larger piece of the last segment (Celeste) to ensure it blends perfectly -->
        @if (lastSegment) {
        <circle cx="60" cy="60" r="50" fill="none" [attr.stroke]="lastSegment.color"
            [attr.stroke-width]="hoveredSegment?.id === lastSegment.id ? 20 : 16" stroke-linecap="round"
            [attr.stroke-dasharray]="lastSegment.dashArray" [attr.stroke-dashoffset]="lastSegment.dashOffset"
            class="transition-all duration-200 ease-out pointer-events-none"
            [class.brightness-125]="hoveredSegment?.id === lastSegment.id" />
        }

        <!-- Hover Top Overlay -->
        @if (hoveredSegment) {
        <circle cx="60" cy="60" r="50" fill="none" [attr.stroke]="hoveredSegment.color" stroke-width="20"
            stroke-linecap="round" [attr.stroke-dasharray]="hoveredSegment.dashArray"
            [attr.stroke-dashoffset]="hoveredSegment.dashOffset"
            class="pointer-events-none transition-all duration-200 ease-out brightness-125" />
        }

    </svg>

    <!-- Center Information Display -->
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-30">

        <!-- Idle State (Title + Subtitle) -->
        <div class="absolute inset-0 flex flex-col items-center justify-center transition-all duration-300"
            [class.opacity-100]="!hoveredSegment" [class.scale-100]="!hoveredSegment" [class.opacity-0]="hoveredSegment"
            [class.scale-95]="hoveredSegment">
            @if (title) {
            <span class="text-slate-400 font-black tracking-[0.2em] uppercase text-center px-4 leading-relaxed"
                [ngClass]="titleClass">
                {{ title }}
            </span>
            }
            @if (subtitle) {
            <span class="text-white font-black tracking-tighter drop-shadow-lg leading-none mt-0.5"
                [ngClass]="subtitleClass">
                {{ subtitle }}
            </span>
            }
        </div>

        <!-- Hover State (Segment Details) -->
        <div class="absolute inset-0 flex flex-col items-center justify-center transition-all duration-300"
            [class.opacity-100]="hoveredSegment" [class.scale-100]="hoveredSegment" [class.opacity-0]="!hoveredSegment"
            [class.scale-95]="!hoveredSegment">

            <div class="flex flex-col items-center text-center w-full">
                @if (hoveredSegment) {
                <span
                    class="text-white/60 font-black tracking-widest uppercase mb-0.5 truncate w-full px-2 transition-colors"
                    [ngClass]="hoverNameClass" [style.color]="hoveredSegment.color">
                    {{ hoveredSegment.name }}
                </span>
                <div class="flex items-baseline justify-center gap-1.5 mb-0.5">
                    <span class="text-slate-400 text-sm font-bold drop-shadow-md">{{ '' |
                        dynamicCurrencySymbol }}</span>
                    <span class="font-black tracking-tighter drop-shadow-md transition-colors"
                        [ngClass]="hoverAmountClass + ' ' + (hoveredSegment.amountColorClass || 'text-white')">{{
                        hoveredSegment.amount |
                        dynamicCurrency:currencyState.currentCurrency() }}</span>
                </div>
                <span class="text-slate-400 font-black" [ngClass]="hoverPercentageClass">({{ hoveredSegment.percentage |
                    number:'1.0-0'
                    }}%)</span>
                }
            </div>
        </div>
    </div>
</div>
