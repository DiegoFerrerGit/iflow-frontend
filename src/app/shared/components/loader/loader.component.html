<div class="loader-container" [ngClass]="{
    'global-overlay absolute inset-0 z-[9999] bg-[#0b0e14]/80 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-300': fullScreen,
    'inline-flex items-center justify-center': !fullScreen
  }">

    @if (fullScreen) {
    <!-- Global Loader: Animated IFLOW text -->
    <div class="relative flex flex-col items-center justify-center">
        <!-- Pulsing background glow -->
        <div class="absolute inset-0 bg-primary/20 rounded-full blur-[60px] scale-150 animate-pulse"></div>

        <h1 class="text-4xl md:text-6xl font-black tracking-widest relative z-10 animate-pulse">
            <span
                class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-fuchsia-400 drop-shadow-[0_0_15px_rgba(168,85,247,0.5)]">
                IFLOW
            </span>
        </h1>

        <span
            class="mt-6 text-white/80 font-bold tracking-[0.3em] uppercase text-xs sm:text-sm flex items-center gap-2">
            Sincronizando
            <span class="flex gap-1">
                <span class="w-1 h-1 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></span>
                <span class="w-1 h-1 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></span>
                <span class="w-1 h-1 bg-primary rounded-full animate-bounce"></span>
            </span>
        </span>
    </div>
    } @else {
    <!-- Inline Loader: Animated Logo -->
    <div class="relative flex items-center justify-center w-full h-full min-w-[20px] min-h-[20px]">
        <!-- Subtle spinning ring behind logo -->
        <svg class="absolute inset-0 w-full h-full animate-spin-slow drop-shadow-[0_0_8px_rgba(168,85,247,0.4)]"
            viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="45" stroke="#a855f7" stroke-width="4" stroke-dasharray="70 200"
                stroke-linecap="round" />
        </svg>
        <!-- Logo pulsing -->
        <img src="assets/images/iflow-logo.svg" alt="Loading"
            class="w-[60%] h-[60%] object-contain animate-pulse drop-shadow-[0_0_10px_rgba(168,85,247,0.6)]">
    </div>
    }

</div>
