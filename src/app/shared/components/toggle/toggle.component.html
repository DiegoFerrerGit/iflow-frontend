<div class="flex flex-col gap-1.5 w-full">
    @if (label) {
    <label class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase pl-1">{{ label }}</label>
    }

    <div class="relative grid bg-[#151821] border border-white/10 rounded-full p-1 h-[46px] w-full items-center overflow-hidden"
        [style.grid-template-columns]="'repeat(' + options.length + ', 1fr)'">
        <!-- Sliding Highlight -->
        <div class="absolute top-1 bottom-1 left-1 rounded-full bg-gradient-to-r from-[#a855f7] to-[#7c3aed] shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-300 ease-out z-0 pointer-events-none"
            [style.width]="'calc(' + (100 / options.length) + '% - 2px)'"
            [style.transform]="'translateX(' + (getSelectedIndex() * 100) + '%)'">
        </div>

        <!-- Options -->
        @for (option of options; track option.value) {
        <button type="button" (click)="selectOption(option.value)"
            class="flex-1 h-full flex items-center justify-center gap-1 z-10 transition-colors duration-300 relative group"
            [class.text-white]="selectedValue === option.value" [class.text-slate-500]="selectedValue !== option.value">
            @if (option.icon) {
            <span class="material-symbols-outlined text-[18px]">{{ option.icon }}</span>
            }
            <span class="text-[11px] font-bold tracking-tight whitespace-nowrap px-1">{{ option.label }}</span>
        </button>
        }
    </div>
</div>
