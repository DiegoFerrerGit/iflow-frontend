<div class="flex flex-col gap-1.5 w-full">
    @if (label) {
    <label class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase pl-1">{{ label }}</label>
    }

    <div
        class="relative flex bg-[#151821] border border-white/10 rounded-xl p-1 h-[46px] w-full items-center overflow-hidden">
        <!-- Sliding Highlight -->
        <div class="absolute top-1 bottom-1 left-1 rounded-lg bg-primary/20 border border-primary/30 shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all duration-300 ease-out z-0 pointer-events-none"
            [style.width]="'calc(' + (100 / options.length) + '% - 8px)'"
            [style.transform]="'translateX(' + (getSelectedIndex() * 100) + '%)'">
        </div>

        <!-- Options -->
        @for (option of options; track option.value) {
        <button type="button" (click)="selectOption(option.value)"
            class="flex-1 h-full flex items-center justify-center gap-2 z-10 transition-colors duration-300 relative group"
            [class.text-white]="selectedValue === option.value" [class.text-slate-500]="selectedValue !== option.value">
            @if (option.icon) {
            <span class="material-symbols-outlined text-[18px]" [class.text-primary]="selectedValue === option.value">{{
                option.icon }}</span>
            }
            <span class="text-xs font-black tracking-widest uppercase">{{ option.label }}</span>
        </button>
        }
    </div>
</div>
