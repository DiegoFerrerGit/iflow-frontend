<!-- Full Screen Overlay to close the menu when clicking outside -->
@if(isMenuOpen()) {
<div class="fixed inset-0 z-[9990] bg-black/30 backdrop-blur-sm transition-opacity" (click)="closeUserMenu()"></div>
}

<!-- The User Menu Popup -->
<!-- This slides up from just above the nav bar -->
<div class="fixed bottom-[76px] right-4 z-[9995] bg-[#16121d] border border-white/10 rounded-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.6)] flex flex-col min-w-[280px] overflow-hidden transition-all duration-300 transform origin-bottom"
    [class.opacity-0]="!isMenuOpen()" [class.scale-y-0]="!isMenuOpen()" [class.pointer-events-none]="!isMenuOpen()"
    [class.opacity-100]="isMenuOpen()" [class.scale-y-100]="isMenuOpen()">

    <!-- Header of Popup -->
    <div class="px-4 py-3 border-b border-white/5 bg-white/5">
        <p class="text-xs text-slate-400 font-medium">Conectado como</p>
        <p class="text-sm text-white font-bold truncate">{{ userFullName() || 'Usuario' }}</p>
    </div>

    <!-- Options -->
    <div class="px-4 pb-3 mb-2 border-b border-white/5 flex flex-col gap-4 mt-4">

        <!-- Custom UI for Currency Toggle -->
        <div class="flex items-center justify-between gap-4">
            <span class="text-xs text-slate-400 font-bold tracking-wider whitespace-nowrap">MONEDA ACTIVA</span>

            <button (click)="currencyManager.toggleCurrency()"
                class="flex items-center gap-3 bg-black/40 border border-white/10 rounded-full px-4 py-2 hover:bg-white/5 transition-colors">
                <span class="text-sm font-black" [class.text-sky-400]="currencyManager.currentCurrency() === 'ARS'"
                    [class.text-slate-400]="currencyManager.currentCurrency() !== 'ARS'">ARS</span>

                <div
                    class="relative w-10 h-6 bg-slate-800 rounded-full overflow-hidden shadow-inner flex items-center shrink-0">
                    <div class="absolute w-4 h-4 bg-sky-400 rounded-full transform transition-transform duration-300 left-[2px] shadow-sm"
                        [class.translate-x-[18px]]="currencyManager.currentCurrency() !== 'ARS'"
                        [class.bg-emerald-400]="currencyManager.currentCurrency() !== 'ARS'"></div>
                </div>

                <span class="text-sm font-black" [class.text-emerald-400]="currencyManager.currentCurrency() !== 'ARS'"
                    [class.text-slate-400]="currencyManager.currentCurrency() === 'ARS'">USD</span>
            </button>
        </div>

        <!-- Quotation Info -->
        <div class="flex items-center justify-between bg-black/20 rounded-lg px-4 py-3 border border-white/5">
            <div class="flex items-center gap-2 text-slate-400">
                <span class="material-symbols-outlined text-[16px]">price_change</span>
                <span class="text-sm font-medium">Cotización</span>
            </div>
            <span class="text-base font-bold text-white">$ {{ currencyManager.exchangeRate() }}</span>
        </div>

    </div>

    <button (click)="logout(); closeUserMenu()"
        class="flex items-center justify-center gap-3 py-3 text-logout-coral hover:bg-logout-coral/10 transition-colors mx-2 rounded-lg w-[calc(100%-16px)]">
        <span class="material-symbols-outlined text-[1.2rem]">logout</span>
        <span class="text-sm font-bold">Cerrar Sesión</span>
    </button>
</div>

<!-- Bottom Navigation Bar for Mobile -->
<nav
    class="fixed bottom-0 left-0 right-0 z-[9999] bg-[#0f0a15] border-t border-white/5 pb-safe shadow-[0_-4px_30px_rgba(0,0,0,0.6)]">
    <div class="flex items-center justify-between px-6 h-[60px] md:h-[76px] pb-2 pt-2">

        <!-- Center-Left: Odin Navigation -->
        <a routerLink="/odin" (click)="closeUserMenu()" routerLinkActive="text-primary-400"
            [routerLinkActiveOptions]="{exact: false}"
            class="flex items-center justify-center h-full text-slate-400 hover:text-fuchsia-400 transition-colors group">

            <!-- Odin SVG Eye Icon (No Text, No Background) -->
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                shape-rendering="geometricPrecision"
                class="w-9 h-9 md:w-11 md:h-11 group-hover:scale-110 transition-transform">
                <defs>
                    <linearGradient id="odinEyeGradBottomNav" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M25 50 C 35 15, 75 15, 85 50 C 75 85, 35 85, 25 50 Z" fill="url(#odinEyeGradBottomNav)" />
                <circle cx="55" cy="50" r="18" fill="#0f0a15" />
                <rect x="53" y="38" width="4" height="24" rx="2" fill="#f1f5f9" />
            </svg>
        </a>

        <!-- Right: User Avatar / Settings Menu Toggle -->
        <button (click)="toggleUserMenu()" [class.ring-2]="isMenuOpen()" [class.ring-primary]="isMenuOpen()"
            class="flex flex-col items-center justify-center w-[36px] h-[36px] md:w-[46px] md:h-[46px] rounded-full transition-all focus:outline-none">

            @if (userAvatarUrl()) {
            <img [src]="userAvatarUrl()" alt="Avatar" referrerpolicy="no-referrer"
                class="w-full h-full rounded-full object-cover border border-white/10"
                style="image-rendering: -webkit-optimize-contrast;" />
            } @else {
            <!-- Initials Fallback (if no avatar) -->
            <div
                class="w-full h-full bg-primary rounded-full flex items-center justify-center text-[#16121d] font-bold text-sm shadow-[0_0_10px_rgba(168,85,247,0.3)]">
                {{ userInitials() }}
            </div>
            }
        </button>

    </div>
</nav>
